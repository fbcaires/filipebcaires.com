# Custom theme override (based on Wowchemy minimal)
name = "Minimal"

[light]
  # Primary — slightly darker, towards navy
  primary = "#0d3380"

  # Menu
  menu_primary = "#fff"
  menu_text = "#34495e"
  menu_text_active = "#0d3380"
  menu_title = "#2b2b2b"

  # Home sections
  home_section_odd = "rgb(255, 255, 255)"
  home_section_even = "rgb(247, 247, 247)"

[dark]
  primary = "#bbdefb"
  link = "#bbdefb"
  link_hover = "#bbdefb"
